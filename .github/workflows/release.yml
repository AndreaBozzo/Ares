name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: read
  packages: write

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      changelog: ${{ steps.changelog.outputs.content }}
    steps:
      - name: Validate tag format
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"

          # Strict semver - no pre-release suffixes
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: $VERSION"
            echo "::error::Expected format: vX.Y.Z (e.g., v0.1.0)"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Validated version: $VERSION"

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify Cargo.toml version matches tag
        run: |
          CARGO_VERSION=$(grep -m1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          TAG_VERSION="${{ steps.version.outputs.version }}"

          if [[ "$CARGO_VERSION" != "$TAG_VERSION" ]]; then
            echo "::error::Version mismatch!"
            echo "::error::Cargo.toml version: $CARGO_VERSION"
            echo "::error::Tag version: $TAG_VERSION"
            exit 1
          fi
          echo "Version match confirmed: $CARGO_VERSION"

      - name: Check CHANGELOG has entry for version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if ! grep -q "## \[$VERSION\]" CHANGELOG.md; then
            echo "::error::No CHANGELOG entry found for version $VERSION"
            echo "::error::Run the 'Prepare Release' workflow first, or manually update CHANGELOG.md"
            exit 1
          fi
          echo "CHANGELOG entry found for $VERSION"

      - name: Verify internal dependency versions
        run: |
          for crate in ares-core ares-client ares-db; do
            if ! grep -q "${crate} = { version" Cargo.toml; then
              echo "::error::Internal dependency $crate is missing 'version' field in workspace Cargo.toml"
              echo "::error::Run the 'Prepare Release' workflow first"
              exit 1
            fi
          done
          echo "All internal dependencies have version fields"

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff@2.7

      - name: Extract changelog for this version
        id: changelog
        run: |
          # Extract just the current version's changelog for GitHub Release
          if ! CHANGELOG=$(git-cliff --current --strip header); then
            echo "::error::Failed to extract changelog with git-cliff"
            exit 1
          fi

          # Debug: show what git-cliff produced
          echo "--- git-cliff output (first 20 lines) ---"
          echo "$CHANGELOG" | head -20
          echo "--- end ---"

          if [[ -z "${CHANGELOG//[[:space:]]/}" ]]; then
            echo "::error::git-cliff returned empty changelog content"
            echo "::notice::Falling back to CHANGELOG.md extraction"
            VERSION="${{ steps.version.outputs.version }}"
            CHANGELOG=$(sed -n "/^## \[$VERSION\]/,/^## \[/{ /^## \[$VERSION\]/p; /^## \[/!p; }" CHANGELOG.md)
          fi

          if [[ -z "${CHANGELOG//[[:space:]]/}" ]]; then
            echo "::error::No changelog content found from git-cliff or CHANGELOG.md"
            exit 1
          fi

          # Prepend logo to release body
          LOGO_URL="https://raw.githubusercontent.com/${{ github.repository }}/master/docs/assets/logoares.png"

          # Use a unique delimiter to avoid collisions with content
          DELIMITER="CHANGELOG_$(date +%s)"
          {
            echo "content<<${DELIMITER}"
            echo '<div align="center">'
            echo "  <img src=\"${LOGO_URL}\" alt=\"Ares\" width=\"600\" />"
            echo '</div>'
            echo ""
            echo "$CHANGELOG"
            echo "${DELIMITER}"
          } >> "$GITHUB_OUTPUT"

  test:
    name: Test Suite
    needs: validate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ares_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --verbose

      - name: Run unit tests
        run: cargo test --verbose --lib --bins

      - name: Run doc tests
        run: cargo test --verbose --doc

      - name: Run integration tests
        run: cargo test --verbose --test '*'
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ares_test

      - name: Security audit
        uses: EmbarkStudios/cargo-deny-action@v2

  docker:
    name: Publish Docker Image
    needs: [validate, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Compute lowercase registry owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/ares-api:${{ needs.validate.outputs.version }}
            ghcr.io/${{ steps.owner.outputs.value }}/ares-api:latest

  dry-run:
    name: Publish Dry Run
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Dry run publish ares-core
        run: cargo publish --dry-run -p ares-core

  publish:
    name: Publish to crates.io
    needs: dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Publish crates to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          publish_crate() {
            local crate=$1
            local max_retries=3
            local retry=0

            while [ $retry -lt $max_retries ]; do
              echo "Publishing $crate (attempt $((retry + 1))/$max_retries)..."
              output=$(cargo publish -p "$crate" 2>&1) && {
                echo "$crate published successfully"
                return 0
              }

              # Treat "already uploaded" as success (idempotent re-run)
              if echo "$output" | grep -q "already uploaded"; then
                echo "$crate already published, skipping"
                return 0
              fi

              echo "$output"
              retry=$((retry + 1))
              if [ $retry -lt $max_retries ]; then
                echo "Retrying in 60 seconds..."
                sleep 60
              fi
            done

            echo "::error::Failed to publish $crate after $max_retries attempts"
            return 1
          }

          # Publish in dependency order with wait between each
          publish_crate ares-core
          echo "Waiting 60s for crates.io indexing..."
          sleep 60

          publish_crate ares-client
          echo "Waiting 60s for crates.io indexing..."
          sleep 60

          publish_crate ares-db
          echo "Waiting 60s for crates.io indexing..."
          sleep 60

          publish_crate ares-cli
          echo "Waiting 60s for crates.io indexing..."
          sleep 60

          publish_crate ares-api
          echo "Waiting 60s for crates.io indexing..."
          sleep 60

          echo "All crates published successfully"

  release:
    name: Create GitHub Release
    needs: [validate, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ needs.validate.outputs.changelog }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
