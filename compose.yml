#      db:
#        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4
    container_name: ares_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ares.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
